<!DOCTYPE html>
<html>
<head>
  <title>Instagram Cleaner</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h2>Instagram Cleaner</h2>

    <div class="toggle">
      <label>
        <input type="checkbox" id="reelsToggle">
        Hide Reels
      </label>
    </div>

    <div class="toggle">
      <label>
        <input type="checkbox" id="exploreToggle">
        Hide Explore
      </label>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
